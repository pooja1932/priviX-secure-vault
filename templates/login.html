{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-8 col-lg-5 animate-enter delay-1">
        <div class="glass-card p-5">
            <div class="text-center mb-5 relative">
                <div class="d-inline-flex justify-content-center align-items-center rounded-circle border p-4 mb-4" style="background: var(--input-bg); border-color: var(--card-border) !important; box-shadow: 0 0 30px var(--icon-bg-primary);">
                    <i class="fa-solid fa-shield-halved" style="font-size: 2.5rem; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i>
                </div>
                <h2 class="fw-bold mb-2 text-main" style="font-size: 2.2rem; letter-spacing: -1px;">Welcome Back</h2>
                <p class="text-muted">Sign in to access your secure files.</p>
            </div>
            
            <form action="{{ url_for('login') }}" method="POST">
                <div class="mb-4">
                    <label for="username" class="form-label text-uppercase text-muted" style="font-size: 0.8rem; letter-spacing: 1px;">Username</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="fa-solid fa-user"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0" id="username" name="username" placeholder="Enter your username" required autofocus>
                    </div>
                </div>
                <div class="mb-5">
                    <label for="password" class="form-label text-uppercase text-muted" style="font-size: 0.8rem; letter-spacing: 1px;">Password</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" class="form-control border-start-0 ps-0" id="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-gradient w-100 py-3 fs-5 mb-4">Sign In</button>
            </form>
            
            <div class="text-center border-top pt-4 mt-2">
                <p class="text-muted small mb-0">Don't have an account? <a href="{{ url_for('signup') }}" class="fw-bold ms-1" style="color: #38bdf8; text-decoration: none; letter-spacing: 0.5px;">Create one</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
